steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - -t
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/id-map-tahap-2:$COMMIT_SHA
      - -t
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/id-map-tahap-2:latest
      - --build-arg
      - NEXT_PUBLIC_CONVEX_URL=${_NEXT_PUBLIC_CONVEX_URL}
      - --build-arg
      - NEXT_PUBLIC_CONVEX_SITE_URL=${_NEXT_PUBLIC_CONVEX_SITE_URL}
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}
      - --build-arg
      - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${_NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
      - --build-arg
      - NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${_NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET}
      - --build-arg
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${_NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/id-map-tahap-2:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - id-map-tahap-2
      - --image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/id-map-tahap-2:$COMMIT_SHA
      - --region=asia-southeast2
      - --platform=managed

substitutions:
  _NEXT_PUBLIC_CONVEX_URL: https://fabulous-bison-818.convex.cloud
  _NEXT_PUBLIC_CONVEX_SITE_URL: https://fabulous-bison-818.convex.site
  _NEXT_PUBLIC_SITE_URL: https://www.id-map.app
  _NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dsvpg5uco
  _NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: idmap_uploads
  _NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADbB8taOGriKCRMo

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/id-map-tahap-2:$COMMIT_SHA
  - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/id-map-tahap-2:latest
